name: Lint

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

permissions:
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: npm

            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Generate PandaCSS
              run: npx panda codegen

            - name: Lint
              run: npm run lint

            - name: Test build
              run: npm run build
